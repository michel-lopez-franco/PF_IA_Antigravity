name: 01 - Hello

on:
    push:
        branches: [ main, master]

jobs:
    hello:
        runs-on: ubuntu-24.04
        steps:
            - name: Saludar
              run: echo "Hola mundo"

            - name: Ver fecha del runner
              run: date

            - name: Ver versión de Ubuntu
              run: lsb_release -a

            - name: Ver archivos disponibles
              run: ls -la


        